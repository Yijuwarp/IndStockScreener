name: Refresh stock data

on:
  schedule:
    # Weekdays 12:45 UTC = 6:15 pm IST, after NSE close: incremental refresh
    - cron: "45 12 * * 1-5"
    # Saturday 03:00 UTC: full-history refresh (safety net for missed adjustments)
    - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      full:
        description: "Force full-history refresh"
        type: boolean
        default: false

permissions:
  contents: write  # the job commits the exported bundle.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 3 * * 6" ] || [ "${{ inputs.full }}" = "true" ]; then
            python -m scripts.run_ingestion --full
          else
            python -m scripts.run_ingestion
          fi

      # Publish the refreshed data as a static file: Vercel redeploys on the push
      # and serves it from the CDN, so frontends never hit the backend to load.
      - name: Export and publish bundle.json
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -m scripts.export_bundle ../frontend/public/bundle.json
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/bundle.json
          if git diff --cached --quiet; then
            echo "bundle unchanged; nothing to publish"
          else
            git commit -m "Publish data bundle ($(date -u +%F))"
            git pull --rebase origin master
            git push origin master
          fi
