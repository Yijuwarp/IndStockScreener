name: Refresh stock data

on:
  schedule:
    # Weekdays 12:45 UTC = 6:15 pm IST, after NSE close: incremental refresh
    - cron: "45 12 * * 1-5"
    # Saturday 03:00 UTC: full-history refresh (safety net for missed adjustments)
    - cron: "0 3 * * 6"
  workflow_dispatch:
    inputs:
      full:
        description: "Force full-history refresh"
        type: boolean
        default: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ "${{ github.event.schedule }}" = "0 3 * * 6" ] || [ "${{ inputs.full }}" = "true" ]; then
            python -m scripts.run_ingestion --full
          else
            python -m scripts.run_ingestion
          fi
