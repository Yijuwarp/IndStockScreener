services:
  - type: web
    name: indstockscreener-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: indstockscreener-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false   # set manually in Render dashboard after Vercel deploy

databases:
  - name: indstockscreener-db
    databaseName: indstockscreener
    plan: free
